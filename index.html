<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ MoNiCa Ticket Board ✨</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #1c1c1c;
    margin: 0; padding: 20px;
    color: #ffffff;
  }
  h1 { text-align: center; margin-bottom: 25px; }
  #controls { text-align: center; margin-bottom: 25px; }
  #ticketTitle {
    padding: 10px; border-radius: 8px; border: 1px solid #6f42c1;
    width: 220px; outline: none; background: #2a2a2a; color: #ffffff;
    margin-right: 10px;
  }
  #controls button {
    padding: 10px 15px; border: none; border-radius: 8px;
    background: #6f42c1; color: #ffffff; font-weight: bold;
    cursor: pointer; transition: 0.3s;
  }
  #controls button:hover { background: #4b2a85; }
  .board { display: flex; gap: 20px; overflow-x: auto; }
  .column { flex: 0 0 250px; min-width: 250px; padding: 15px;
    border-radius: 12px; background: #2a2a2a; border: 1px solid #6f42c1;
  }

  /* --- Updated Ticket Style --- */
  .ticket {
    background: #6f42c1;
    border-radius: 8px;
    padding: 12px;
    margin: 10px 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }
  .ticket:hover {
    transform: scale(1.02);
  }
  .ticket span {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }
  .ticket button {
    margin-right: 5px;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: #4b2a85;
    color: #fff;
    cursor: pointer;
  }
  .ticket button:hover {
    background: #3a216a;
  }
</style>
</head>
<body>
  <h1>✨ MoNiCa Ticket Board ✨</h1>
  <div id="controls">
    <input type="text" id="ticketTitle" placeholder="Enter ticket title">
    <button onclick="createTicket()">Create Ticket</button>
    <button onclick="saveBoard()">Save Board</button>
  </div>

  <div class="board" id="board">
    <div class="column" id="awaiting"><h3>Awaiting Info</h3></div>
    <div class="column" id="strike1"><h3>Strike 1</h3></div>
    <div class="column" id="strike2"><h3>Strike 2</h3></div>
    <div class="column" id="escalated"><h3>Escalated</h3></div>
    <div class="column" id="wip"><h3>WIP</h3></div>
  </div>

  <div id="resolved"><h3>Resolved Cases</h3></div>

<script>
function createTicket(titleText) {
  const ticket = document.createElement('div');
  ticket.className = 'ticket';

  const titleSpan = document.createElement('span');
  titleSpan.textContent = titleText;
  ticket.appendChild(titleSpan);

  const resolveBtn = document.createElement('button');
  resolveBtn.textContent = 'Resolve';
  resolveBtn.onclick = () => document.getElementById('resolved').appendChild(ticket);

  const deleteBtn = document.createElement('button');
  deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = () => ticket.remove();

  ticket.appendChild(resolveBtn);
  ticket.appendChild(deleteBtn);

  document.getElementById('awaiting').appendChild(ticket);
}

function saveBoard() {
  const boardData = {};
  document.querySelectorAll('.column, #resolved').forEach(col => {
    boardData[col.id] = [];
    col.querySelectorAll('.ticket').forEach(ticket => {
      const title = ticket.querySelector('span').innerText;
      boardData[col.id].push(title);
    });
  });
  localStorage.setItem('ticketBoard', JSON.stringify(boardData));
}

function loadBoard() {
  const data = JSON.parse(localStorage.getItem('ticketBoard'));
  if (!data) return;
  Object.keys(data).forEach(colId => {
    const col = document.getElementById(colId);
    data[colId].forEach(title => {
      createTicket(title);
      col.appendChild(document.querySelector('.ticket:last-child'));
    });
  });
}

window.onload = loadBoard;
</script>
</body>
</html>
