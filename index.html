<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Board</title>

  <style>
    /* --- START ng CSS mo --- */
    body {
      font-family: 'Poppins', sans-serif;
      background: #1c1c1c; /* medyo black, dark gray */
      margin: 0; padding: 20px;
      color: #ffffff; /* white font */
    }

    h1 {
      text-align: center;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 20px;
    }

    #controls {
      text-align: center;
      margin-bottom: 20px;
      color: #ffffff;
    }

    #ticketTitle {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #6f42c1; /* purple accent */
      width: 200px;
      outline: none;
      background: #2a2a2a;
      color: #ffffff;
    }

    #controls button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #6f42c1; /* purple */
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    #controls button:hover {
      background: #4b2a85; /* darker purple */
    }

    .board {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .column {
      flex: 1;
      min-width: 180px;
      padding: 10px;
      border-radius: 10px;
      background: #2a2a2a;
      border: 1px solid #6f42c1;
      color: #ffffff;
    }

    .column h3 {
      text-align: center;
      font-size: 16px;
      margin-bottom: 10px;
      color: #ffffff;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .ticket {
      background: #6f42c1; /* purple */
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0;
      cursor: grab;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      color: #ffffff;
      transition: transform 0.2s;
    }

    .ticket:hover {
      transform: scale(1.03);
      background: #4b2a85; /* darker purple hover */
      color: #ffffff;
    }

    .ticket button {
      margin-top: 8px;
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      background: #092372; /* deep blue accent */
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .ticket button:hover {
      background: #03588c; /* lighter blue hover */
    }

    #resolved {
      border: 2px dashed #6f42c1;
      background: #1c1c1c;
      color: #ffffff;
    }
@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  h1 {
    font-size: 20px;
  }

  #ticketTitle {
    width: 100%; /* full width input */
    margin-bottom: 10px;
  }

  #controls {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #controls button {
    width: 100%; /* full width button */
    margin-top: 8px;
  }

  .board {
    flex-direction: column; /* stack columns vertically */
    gap: 10px;
  }

  .column {
    width: 100%; /* each column takes full width */
    min-width: unset;
    margin-bottom: 15px;
  }

  .ticket {
    font-size: 14px;
    padding: 8px;
  }

  .ticket button {
    width: 100%; /* easier to tap */
    margin-top: 5px;
    font-size: 13px;
    padding: 8px;
  }
}
  </style>
</head>
<body>

<h1>✨ MoNiCa Ticket Board ✨</h1>

<div id="controls">
  <input type="text" id="ticketTitle" placeholder="Enter ticket title">
  <button onclick="createTicket()">Create Ticket</button>
</div>

<div class="board">
  <div class="column" id="awaiting" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Awaiting Info</h3>
  </div>
  <div class="column" id="strike1" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Strike 1</h3>
  </div>
  <div class="column" id="strike2" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Strike 2</h3>
  </div>
  <div class="column" id="escalated" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>Escalated</h3>
  </div>
  <div class="column" id="wip" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h3>WIP</h3>
  </div>
</div>

<div class="column" id="resolved" ondrop="drop(event)" ondragover="allowDrop(event)">
  <h3>Resolved Cases</h3>
</div>

<script>
let ticketCounter = 1;

function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  const ticket = document.getElementById(data);
  if (ev.target.classList.contains("column")) {
    ev.target.appendChild(ticket);
  }
}

function resolveTicket(ticketId) {
  const ticket = document.getElementById(ticketId);
  document.getElementById("resolved").appendChild(ticket);
  ticket.querySelector("button").innerText = "Retrieve";
  ticket.querySelector("button").onclick = () => retrieveTicket(ticketId);
}

function retrieveTicket(ticketId) {
  const ticket = document.getElementById(ticketId);
  document.getElementById("awaiting").appendChild(ticket);
  ticket.querySelector("button").innerText = "Resolve";
  ticket.querySelector("button").onclick = () => resolveTicket(ticketId);
}

function deleteTicket(ticketId) {
  const confirmDelete = confirm("Are you sure you want to delete this ticket?");
  if (confirmDelete) {
    const ticket = document.getElementById(ticketId);
    ticket.remove(); // tuluyang burahin
  }
}

function createTicket() {
  const title = document.getElementById("ticketTitle").value.trim();
  if (!title) return alert("Please enter a ticket title.");
  
  const ticket = document.createElement("div");
  ticket.className = "ticket";
  ticket.id = "ticket" + ticketCounter++;
  ticket.draggable = true;
  ticket.ondragstart = drag;
  ticket.innerHTML = `
    <strong>${title}</strong><br>
    <button onclick="resolveTicket('${ticket.id}')">Resolve</button>
    <button onclick="deleteTicket('${ticket.id}')">Delete</button>
  `;
  
  document.getElementById("awaiting").appendChild(ticket);
  document.getElementById("ticketTitle").value = "";
}
</script>

</body>
</html>
